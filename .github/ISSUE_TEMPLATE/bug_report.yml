name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Protocol (STARK/zkVM)
        - Backend (Rollup Node)
        - Integration (Taproot/Bridge)
        - Frontend (Dashboard)
        - Docker/Deployment
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start with '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logs or error messages
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: BitVMX-Z version or commit hash
      placeholder: e.g., v0.1.0 or main@abc123

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: System information
      value: |
        - OS: 
        - Rust version: 
        - Node.js version: 
        - Docker version:
